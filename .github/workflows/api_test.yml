name: Run Postman Collection

on:
  push:
    branches: [ "main" ]

jobs:
  postman-tests:
    runs-on: ubuntu-latest

    steps:

    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Install Newman
      run: npm install -g newman

    - name: Run Postman Collection
      run: |
        newman run Booking.postman_collection.json
